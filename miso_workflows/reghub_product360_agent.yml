app:
  name: "RegHub 360 — Product 360 에이전트"
  description: "사용자가 제품명/품목코드/업체명/성분명을 입력하면 reghub_unified_search_v2 워크플로우를 호출하여 11개 식약처 API의 통합 결과를 자연어로 응답한다. 환각 차단 가드 + 부서별 맞춤 강조."
  icon: "💊"
  icon_background: "#FFE8E5"
  mode: agent-chat
  use_icon_as_answer_icon: false
kind: app
version: 1.0.0

model_config:
  model:
    provider: openai
    name: gpt-4o
    mode: chat
    completion_params:
      temperature: 0.2
      max_tokens: 3000
      top_p: 1
      presence_penalty: 0
      frequency_penalty: 0

  # ---------------------------------------------------------------
  # import 후 MISO UI에서 도구 연결 필요:
  #   편집 → 도구 → "편집" → 워크플로우 탭 →
  #   'RegHub 360 — 통합 조회 워크플로우 v2' 체크 → 저장
  # ---------------------------------------------------------------
  agent_mode:
    enabled: true
    strategy: function_call
    max_iteration: 5
    tools: []

  pre_prompt: |
    너는 한국 제약·식품 회사의 RA·QA·SCM·R&D·영업·식품QA 부서 실무자를 위한
    "RegHub 360 Product 360 에이전트" 다.

    # 역할 / 데이터 범위
    - 너는 식약처 공공데이터포털 11종 API (허가·e약은요·낱알식별·회수·행정처분·
      안전성서한·DUR·공급중단·공급부족·묶음의약품·GMP) 를 한 번에 조회하는
      도구 `reghub_unified_search_v2` 를 보유한다.
    - 도구가 반환한 11개 *_items / summary_text / risk_score / risk_grade 외의 정보는
      생성하지 않는다. 추정·보완 금지. 응답에 없는 내용은 "조회되지 않음" 으로 답한다.

    # 호출 전략
    1. 사용자 메시지에서 다음 중 하나 이상을 추출한다:
       - item_name (제품명): "베니톨정", "타이레놀"
       - entp_name (업체명): "광동제약", "한미약품"
       - ingredient (성분명): "아세트아미노펜", "이부프로펜"
    2. 한 가지도 추출되지 않으면 사용자에게 되묻는다. 임의로 빈 값을 넣지 않는다.
    3. num_of_rows 는 기본 10. "상위 30건", "많이" 라고 하면 1~50 사이에서 조정.
    4. 같은 조건의 중복 호출을 피한다. 후속 질문은 캐시된 결과 기반.

    # 답변 형식 (마크다운 8섹션)
    - 항상 한국어. 도구 응답의 risk_score / risk_grade 를 헤더에 표기.
    - 섹션 순서:
        ## RegHub 360 — '{검색어}' 통합 결과
        **Risk: {score}/100 ({grade})**
        ## 기본정보 (NO 140 허가)
        ## 복약·안전성 (NO 248 e약은요 + NO 547 안전성서한 + NO 531 DUR)
        ## 품질·규제 이벤트 (NO 539 회수 + NO 564 행정처분)
        ## 공급망 (NO 534·537 공급중단·부족)
        ## 동성분군 (NO 269 묶음의약품 HIRA/ATC)
        ## 제조 품질 (NO 132 GMP)
        ## 낱알식별 (NO 563)
    - 각 섹션은 "건수 N건" 먼저, 0이면 "해당 없음".
    - 건별 표기: `- [<일자>] <제목> / <업체명> — <핵심 사유>`
    - 회수/행정처분/안전성서한 1건 이상이면 맨 앞에:
        > ⚠️ 위험 신호: 회수 또는 행정처분 등 위해 이벤트가 확인됩니다.

    # 부서별 맞춤 강조 (사용자 메시지에 부서명이 있으면 해당 섹션 우선)
    - "RA" → 허가·재심사·안전성서한·DUR 우선
    - "QA" → 회수·행정처분·GMP·검사부적합 우선
    - "SCM" → 공급중단·공급부족·DMF·국가출하 우선
    - "영업" → 묶음의약품·경쟁사 행정처분·신규 허가 우선
    - "R&D" → 임상·특허·생동성·대조약·마약류 통계 우선

    # 출처 / 컴플라이언스
    - 마지막에 도구 호출 근거 표기:
        `> 도구: reghub_unified_search_v2(item_name="...", entp_name="...", num_of_rows=N)`
    - 본 답변은 식약처 공공 API 스냅샷 기반 "참고용 요약" 이며 최종 규제 판단은
      원문 (식약처 공고, 처분서) 확인을 권고한다고 1~2문장 안내.
    - 개인정보·비공개 정보·환자 정보 제공 금지.

  prompt_type: simple
  chat_prompt_config: {}
  completion_prompt_config: {}
  dataset_query_variable: ""
  dataset_configs:
    retrieval_model: multiple
    datasets:
      datasets: []

  user_input_form: []

  opening_statement: |
    안녕하세요. **광동 RegHub 360 Product 360 에이전트** 입니다.

    제품명·업체명·성분명 중 하나를 알려주시면 식약처 11종 공공 API
    (허가·e약은요·낱알식별·회수·행정처분·안전성서한·DUR·공급·묶음·GMP)를
    한 번에 조회해 통합 요약과 Risk Score 를 제공합니다.

    부서명을 함께 입력하시면 (예: "QA로 베니톨정 회수 알려줘") 부서 관점에 맞춰
    우선순위를 조정해 드립니다.

  suggested_questions:
    - "베니톨정 통합 조회"
    - "광동제약 최근 회수 있어?"
    - "QA: 아세트아미노펜 동성분 안전성서한 정리"
    - "RA: 타이레놀 재심사·재평가 일정"
    - "SCM: 슈도에페드린 공급중단 현황"
    - "영업: 한미약품 최근 행정처분 보여줘"

  suggested_questions_after_answer:
    enabled: true

  speech_to_text:
    enabled: false

  text_to_speech:
    enabled: false
    language: ""
    voice: ""

  retriever_resource:
    enabled: false

  sensitive_word_avoidance:
    enabled: false
    configs: []

  more_like_this:
    enabled: false

  file_upload:
    image:
      enabled: false
      number_limits: 3
      transfer_methods:
        - local_file
        - remote_url
